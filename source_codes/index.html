<!DOCTYPE html>
<html>
<head>
    <title>Car Registration & Tracking</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, button { margin: 5px; padding: 8px; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<h2> Car Registration & Tracking System</h2>

<!-- AUTH -->
<div class="box">
    <h3>Register</h3>
    <input id="reg_user" placeholder="Username">
    <input id="reg_pass" type="password" placeholder="Password">
    <input id="reg_email" placeholder="Email">
    <button onclick="register()">Register</button>
</div>

<div class="box">
    <h3>Login</h3>
    <input id="log_user" placeholder="Username">
    <input id="log_pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- USER INFO -->
<div class="box">
    <h3>Session</h3>
    <p>User ID: <span id="user_id">-</span></p>
    <p>Token: <span id="token">-</span></p>
</div>

<!-- ADD CAR -->
<div class="box">
    <h3>Add Car</h3>
    <input id="plate" placeholder="Plate Number">
    <input id="brand" placeholder="Brand">
    <input id="model" placeholder="Model">
    <button onclick="addCar()">Add Car</button>
</div>

<!-- CAR LIST -->
<div class="box">
    <h3>Your Cars</h3>
    <button onclick="getCars()">Refresh List</button>
    <ul id="car_list"></ul>
</div>

<!-- UPDATE LOCATION -->
<div class="box">
    <h3>Update Location</h3>
    <input id="car_id_loc" placeholder="Car ID">
    <input id="location" placeholder="New Location">
    <button onclick="updateLocation()">Update</button>
</div>

<p id="output"></p>

<script>
const API = "http://localhost/REST API Task/service.php";

let user_id = "";
let token = "";

// REGISTER
function register() {
    fetch(API + "?action=register", {
        method: "POST",
        body: new URLSearchParams({
            username: reg_user.value,
            password: reg_pass.value,
            email: reg_email.value
        })
    })
    .then(res => res.json())
    .then(data => show(data.message));
}

// LOGIN
function login() {
    fetch(API + "?action=login", {
        method: "POST",
        body: new URLSearchParams({
            username: log_user.value,
            password: log_pass.value
        })
    })
    .then(res => res.json())
    .then(data => {
        show(data.message);
        if (data.status === "success") {
            user_id = data.user_id;
            token = data.token;
            document.getElementById("user_id").innerText = user_id;
            document.getElementById("token").innerText = token;
        }
    });
}

// ADD CAR
function addCar() {
    fetch(API + "?action=addCar", {
        method: "POST",
        body: new URLSearchParams({
            user_id,
            token,
            plate_number: plate.value,
            brand: brand.value,
            model: model.value
        })
    })
    .then(res => res.json())
    .then(data => show(data.message));
}

// GET CARS
function getCars() {
    fetch(`${API}?action=getCars&user_id=${user_id}&token=${token}`)
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("car_list");
        list.innerHTML = "";

        if (data.status === "success") {
            data.data.forEach(car => {
                let li = document.createElement("li");
                li.innerText = `ID:${car.car_id} | ${car.plate_number} - ${car.brand} (${car.location})`;
                list.appendChild(li);
            });
        } else {
            show(data.message);
        }
    });
}

// UPDATE LOCATION
function updateLocation() {
    fetch(API + "?action=updateLocation", {
        method: "POST",
        body: new URLSearchParams({
            car_id: car_id_loc.value,
            location: location.value
        })
    })
    .then(res => res.json())
    .then(data => show(data.message));
}

// OUTPUT
function show(msg) {
    document.getElementById("output").innerText = msg;
}
</script>

</body>
</html>
